<!DOCTYPE html>
<html lang="ar" dir="rtl" x-data="taksimApp()" class="dark-theme">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Taksim Point | فرع الجوهرة</title>
    
    <link rel="icon" type="image/png" href="https://cdn.phototourl.com/free/2026-04-06-d0b6c388-fcdf-40fd-a7dc-56a84b8309a2.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;900&family=Montserrat:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --gold: #D4AF37; --white-gold: #e8d9b6; --bg-main: #080808; --text-main: #ffffff;
            --card-bg: rgba(15, 15, 15, 0.95); --border-color: rgba(232, 217, 182, 0.25); 
            --glass-nav: rgba(10, 10, 10, 0.98); --marble-img: url('https://www.transparenttextures.com/patterns/black-mamba.png');
        }
        body { 
            font-family: 'Montserrat', 'Cairo', sans-serif; background-color: var(--bg-main); 
            background-image: var(--marble-img); background-attachment: fixed; color: var(--text-main); 
            -webkit-tap-highlight-color: transparent; scroll-behavior: smooth;
        }
        [x-cloak] { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .text-brand-gold { color: var(--white-gold) !important; }
        .pdf-title-ar { font-family: 'Cairo', sans-serif; font-weight: 900; }
        
        .glass-nav { background: var(--glass-nav); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border-color); box-shadow: 0 4px 25px rgba(0,0,0,0.8); }
        .theme-card { background-color: var(--card-bg); backdrop-filter: blur(8px); border: 1px solid var(--border-color); transition: all 0.3s; }
        .slider-container { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scroll-behavior: smooth; }
        .slide { min-width: 100%; scroll-snap-align: center; }

        .mirror-img { transform: scaleX(-1); }

        .category-container {
            margin-bottom: 40px; border-radius: 16px; overflow: hidden;
            border: 1px solid var(--border-color); background-color: #0d0d0d;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .category-banner { height: 25vh; width: 100%; position: relative; overflow: hidden; }
        .category-banner img { width: 100%; height: 100%; object-fit: cover; }
        .category-banner-overlay { position: absolute; inset: 0; background: linear-gradient(to top, #0d0d0d 0%, rgba(13,13,13,0.8) 20%, transparent 100%); }
        .category-title-wrapper { position: absolute; bottom: 15px; right: 15px; z-index: 10; }

        .most-requested-btn {
            background: linear-gradient(to right, #D4AF37, #B38728); color: #000; font-weight: 900;
            font-size: 10px; padding: 4px 10px; border-radius: 6px; display: flex; align-items: center; gap: 4px;
            animation: pulse-gold 2s infinite;
        }
        @keyframes pulse-gold {
            0% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(212, 175, 55, 0); }
            100% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0); }
        }
    </style>
</head>
<body class="overflow-x-hidden relative" :dir="isRTL ? 'rtl' : 'ltr'" x-init="initApp()" @scroll.window="handleScroll()">

    <audio id="click-sfx" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" preload="auto"></audio>
    <audio id="pop-sfx" src="https://assets.mixkit.co/active_storage/sfx/2570/2570-preview.mp3" preload="auto"></audio>

    <nav class="fixed top-0 w-full z-[100] glass-nav px-3 py-3 flex justify-between items-center" x-show="view !== 'explore'">
        <div class="flex items-center gap-2">
            <img src="https://cdn.phototourl.com/free/2026-04-06-d0b6c388-fcdf-40fd-a7dc-56a84b8309a2.png" alt="Taksim" class="h-8 object-contain">
            <span class="text-[9px] font-black text-brand-gold bg-white/5 px-2 py-1 rounded border border-[var(--border-color)]">فرع الجوهرة</span>
        </div>
        <div class="flex items-center gap-1.5">
            <button @click="playSound('click'); scrollToSmartGrill()" class="most-requested-btn"><span>🔥</span> الأكثر طلباً</button>
            <button @click="playSound('click'); showSearchModal = true" class="p-1.5 border border-[var(--border-color)] rounded text-brand-gold">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </button>
            <select x-model="currentLang" @change="changeLanguage()" class="bg-[var(--card-bg)] text-brand-gold text-[10px] border border-[var(--border-color)] px-1 py-1 rounded outline-none font-bold">
                <template x-for="(url, code) in langLinks" :key="code"><option :value="code" x-text="code.toUpperCase()"></option></template>
            </select>
        </div>
    </nav>

    <div x-show="isLoading" class="fixed inset-0 z-[200] bg-[var(--bg-main)] flex flex-col items-center justify-center">
        <img src="https://cdn.phototourl.com/free/2026-04-06-d0b6c388-fcdf-40fd-a7dc-56a84b8309a2.png" class="h-20 mb-6 animate-pulse">
        <div class="text-brand-gold text-sm font-black tracking-widest uppercase">Taksim Point Al-Jawhara...</div>
    </div>

    <div x-show="view === 'home' && !isLoading" class="pb-32 pt-24">
        <section class="px-6 mb-8 text-center">
            <img src="https://cdn.phototourl.com/free/2026-04-06-d0b6c388-fcdf-40fd-a7dc-56a84b8309a2.png" class="h-20 mx-auto mb-6 object-contain">
            <h1 class="text-2xl font-black mb-4 text-brand-gold tracking-wide">تقسيم بوينت | الجوهرة</h1>
            <p class="text-sm text-brand-gold opacity-90 leading-relaxed font-medium">أهلاً بكم في فرع حي الجوهرة، نتشرف بخدمتكم.</p>
        </section>

        <section class="px-6 mb-6">
            <div class="overflow-hidden rounded-2xl shadow-xl border border-[var(--border-color)] p-1 bg-[var(--card-bg)]">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3769.386486430979!2d41.07816606016587!3d19.134552382156638!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x15e68f00666986fd%3A0xc81a3e382a661914!2z2YXYt9i52YUg2KrZgtiz2YrZhSDYqNmI2YrZhtiqIHwgVGFrc2ltcG9pbnQgcmVzdGF1cmFudHM!5e0!3m2!1sar!2ssa!4v1776361993640!5m2!1sar!2ssa" width="100%" height="200" style="border:0; border-radius:12px;" allowfullscreen="" loading="lazy"></iframe>
            </div>
        </section>

        <div class="px-4 mb-10">
            <button @click="playSound('click'); scrollToSmartGrill()" class="w-full bg-gradient-to-r from-[#D4AF37] to-[#B38728] text-black rounded-xl p-5 flex items-center justify-between shadow-2xl active:scale-95 transition">
                <div class="flex items-center gap-4"><span class="text-4xl">🔥</span><div class="text-right"><h3 class="font-black text-xl tracking-wide">قسم المشويات</h3><p class="text-[11px] font-bold opacity-90 uppercase">The Most Requested</p></div></div><span class="text-2xl font-black">➔</span>
            </button>
        </div>

        <section class="px-5 mb-10">
            <div class="grid grid-cols-2 gap-3">
                <template x-for="cat in normalCategories" :key="cat">
                    <button @click="playSound('click'); scrollToCat(cat)" class="theme-card relative h-28 rounded-xl overflow-hidden flex items-center justify-center border active:scale-95 transition">
                        <img :src="getCategoryBg(cat)" class="absolute inset-0 w-full h-full opacity-50 object-cover mirror-img">
                        <div class="absolute inset-0 bg-black/50"></div>
                        <span class="relative z-10 font-black text-sm tracking-wide text-center px-2 text-brand-gold" x-text="cat"></span>
                    </button>
                </template>
            </div>
        </section>
    </div>

    <div x-show="view === 'menu'" class="min-h-screen pt-20 pb-32" x-cloak>
        <div class="fixed top-[65px] left-0 w-full z-40 transition-transform duration-300" :class="showCatBar ? 'translate-y-0' : '-translate-y-full'">
            <div class="flex gap-2 overflow-x-auto no-scrollbar px-4 py-2 glass-nav border-b border-[var(--border-color)]">
                <template x-for="cat in normalCategories" :key="cat">
                    <button @click="playSound('click'); scrollToCat(cat)" class="px-4 py-2 text-xs font-black tracking-wide whitespace-nowrap text-brand-gold opacity-70 hover:opacity-100" x-text="cat"></button>
                </template>
            </div>
        </div>

        <div class="px-4 mt-12">
            <template x-for="cat in normalCategories" :key="cat">
                <div class="category-container scroll-mt-[130px]" :id="'cat-' + btoa(unescape(encodeURIComponent(cat))).replace(/=/g, '')">
                    <div class="category-banner border-b border-[var(--border-color)]">
                        <img :src="getCategoryBg(cat)" class="mirror-img" loading="lazy">
                        <div class="category-banner-overlay"></div>
                        <div class="category-title-wrapper border-r-4 pr-3 border-[var(--gold)]">
                            <h2 class="text-3xl font-black tracking-wide text-brand-gold drop-shadow-md" x-text="cat"></h2>
                        </div>
                    </div>
                    <div class="p-4 flex flex-col gap-5">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                            <template x-for="item in getCatItems(cat)" :key="item.id">
                                <div class="flex flex-col relative theme-card rounded-xl p-4 transition-all"
                                     :class="(item.name.includes('جريل') || item.name.toLowerCase().includes('grill')) ? 'border-[var(--gold)] bg-[var(--gold)]/10 shadow-[0_0_20px_rgba(212,175,55,0.15)]' : 'border-[var(--border-color)]/50'">
                                    <template x-if="item.name.includes('جريل') || item.name.toLowerCase().includes('grill')">
                                        <span class="absolute -top-3 left-4 bg-gradient-to-r from-[var(--gold)] to-[#B38728] text-black text-[10px] font-black px-3 py-0.5 rounded shadow-lg">🔥 الأكثر طلباً</span>
                                    </template>
                                    <div class="flex items-end w-full mb-2 gap-1.5">
                                        <h4 class="font-black text-[14px] tracking-wide leading-snug w-[74%] flex-grow" style="text-shadow: 0px 1px 2px rgba(0,0,0,0.8);" :class="(item.name.includes('جريل')) ? 'text-[var(--gold)]' : 'text-brand-gold'" x-text="item.name"></h4>
                                        <div class="flex-1 border-b-2 border-dotted relative top-[-5px] min-w-[8px] border-[var(--border-color)]"></div>
                                        <span class="font-black text-[14px] whitespace-nowrap" style="text-shadow: 0px 1px 2px rgba(0,0,0,0.8);" :class="(item.name.includes('جريل')) ? 'text-[var(--gold)]' : 'text-brand-gold'" x-text="item.price + ' SR'"></span>
                                    </div>
                                    <div class="flex justify-between items-start gap-2">
                                        <p class="text-[11px] font-medium opacity-70 line-clamp-2 flex-1 pr-1 leading-relaxed text-brand-gold" x-text="item.description"></p>
                                        <button @click="toggleLike(item)" class="p-2.5 glass-nav rounded-full border border-[var(--border-color)] active:scale-75 transition"><span x-text="isLiked(item.id) ? '❤️' : '🤍'" class="text-xs"></span></button>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </div>

    <div class="fixed bottom-0 w-full glass-nav px-4 py-3 z-[150]">
        <div class="flex justify-between items-center max-w-md mx-auto">
            <button @click="playSound('click'); view = 'home'" :class="view === 'home' ? 'text-brand-gold' : 'opacity-50'" class="flex flex-col items-center gap-1 w-1/3 transition active:scale-95">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 3l9 7.5v10.5h-6v-6h-6v6h-6v-10.5z"/></svg><span class="text-[10px] font-black tracking-wide">الرئيسية</span>
            </button>
            <button @click="playSound('click'); view = 'menu'" :class="view === 'menu' ? 'text-brand-gold' : 'opacity-50'" class="flex flex-col items-center gap-1 w-1/3 transition active:scale-95">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"></path></svg><span class="text-[10px] font-black tracking-wide">المنيو</span>
            </button>
            <button @click="playSound('click'); view = 'likes'" :class="view === 'likes' ? 'text-brand-gold' : 'opacity-50'" class="flex flex-col items-center gap-1 relative w-1/3 transition active:scale-95">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                <span x-show="likes.length > 0" class="absolute -top-1 right-1/2 translate-x-4 bg-red-600 text-white text-[9px] font-bold w-4 h-4 rounded-full flex items-center justify-center shadow-md" x-text="likes.length"></span>
                <span class="text-[10px] font-black tracking-wide">طلباتي</span>
            </button>
        </div>
    </div>

    <script>
        function taksimApp() {
            return {
                isLoading: true, view: 'home', currentLang: 'ar', 
                showSearchModal: false, showInvoiceModal: false, searchQuery: '',        
                showCatBar: true, lastScroll: 0,
                allRawData: [], activeMenuItems: [], heroOffers: [], categoryBgs: {}, likes: [], quantities: {},
                targetHeroIds: ['TP-116', 'TP-185', 'TP-186', 'TP-003', 'TP-004'],
                langLinks: {
                    ar: 'https://docs.google.com/spreadsheets/d/1Q_XjEVdVLZ78u-3WtcMg1e-pzLGwTPiceQoF5hDjWFE/export?format=csv&gid=2026156602',
                    en: 'https://docs.google.com/spreadsheets/d/1Q_XjEVdVLZ78u-3WtcMg1e-pzLGwTPiceQoF5hDjWFE/export?format=csv&gid=1709873212'
                },
                get isRTL() { return this.currentLang === 'ar'; },
                handleScroll() { this.showCatBar = window.pageYOffset <= this.lastScroll; this.lastScroll = window.pageYOffset; },
                playSound(type) {
                    const audio = document.getElementById(type === 'pop' ? 'pop-sfx' : 'click-sfx');
                    if(audio) { audio.currentTime = 0; audio.volume = 0.4; audio.play().catch(()=>{}); }
                },
                async changeLanguage() {
                    this.isLoading = true;
                    try {
                        const res = await fetch(this.langLinks[this.currentLang] + '&t=' + Date.now());
                        const text = await res.text();
                        Papa.parse(text, {
                            header: false, skipEmptyLines: true,
                            complete: (results) => {
                                const rows = results.data.slice(1);
                                this.allRawData = rows.map(cols => {
                                    let id = (cols[0] || '').trim(); let cat = (cols[1] || '').trim();
                                    if(parseInt(id.replace('TP-','')) >= 250 && parseInt(id.replace('TP-','')) <= 400) this.categoryBgs[cat] = (cols[6] || '').trim();
                                    return {
                                        id: id, category: cat, name: (cols[2] || '').trim(), price: (cols[3] || '').trim(),
                                        description: (cols[5] || '').trim(), image: (cols[6] || '').trim(),
                                        available: cols.length > 8 ? (cols[8] || '').trim() : '' // توفر الجوهرة (العمود التاسع)
                                    }
                                }).filter(i => i.id.startsWith('TP-'));
                                this.activeMenuItems = this.allRawData.filter(i => i.available !== 'غير متوفر' && (parseInt(i.id.replace('TP-','')) < 250 || parseInt(i.id.replace('TP-','')) > 400));
                                this.heroOffers = this.activeMenuItems.filter(i => this.targetHeroIds.includes(i.id));
                                this.isLoading = false;
                            }
                        });
                    } catch (e) { this.isLoading = false; }
                },
                get normalCategories() { return [...new Set(this.activeMenuItems.map(i => i.category))].filter(c => c); },
                getCatItems(cat) { return this.activeMenuItems.filter(i => i.category === cat); },
                getCategoryBg(cat) { return this.categoryBgs[cat] || ''; },
                scrollToSmartGrill() {
                    this.view = 'menu';
                    this.$nextTick(() => {
                        setTimeout(() => {
                            let targetCat = this.normalCategories.find(c => c.includes('مشوي') || c.toLowerCase().includes('grill'));
                            if(targetCat) {
                                const el = document.getElementById('cat-' + btoa(unescape(encodeURIComponent(targetCat))).replace(/=/g, ''));
                                if(el) window.scrollTo({ top: el.offsetTop - 110, behavior: 'smooth' });
                            }
                        }, 300);
                    });
                },
                scrollToCat(catName) {
                    this.view = 'menu';
                    this.$nextTick(() => {
                        setTimeout(() => {
                            const el = document.getElementById('cat-' + btoa(unescape(encodeURIComponent(catName))).replace(/=/g, ''));
                            if(el) window.scrollTo({ top: el.offsetTop - 110, behavior: 'smooth' });
                        }, 200);
                    });
                },
                toggleLike(item) {
                    this.playSound('pop');
                    if(this.likes.includes(item.id)) { this.likes = this.likes.filter(id => id !== item.id); delete this.quantities[item.id]; }
                    else { this.likes.push(item.id); this.quantities[item.id] = 1; }
                    localStorage.setItem('jawhara_likes_v41', JSON.stringify(this.likes));
                },
                isLiked(id) { return this.likes.includes(id); },
                initApp() { 
                    const saved = localStorage.getItem('jawhara_likes_v41'); if(saved) this.likes = JSON.parse(saved);
                    this.changeLanguage(); 
                }
            }
        }
    </script>
</body>
</html>
